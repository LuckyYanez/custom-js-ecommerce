<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Shoe Store using JS</title>
</head>
<body>
<header class="main-header">
    <div class="container">
        <!-- 1. Left Side: Mobile Menu Button & Logo -->
        <div class="header-left">
            <button class="menu-toggle" aria-label="Toggle Navigation">
                <span></span>
            </button>
            <a class="logo" href="/">
                <img src="assets/logo%20and%20icons/JS%20portfolio%20logo.webp" alt="JS Portfolio Logo" width="170">
            </a>
        </div>

        <!-- 2. Center: Insert your Search Bar here later -->
        <div class="header-search">
    <form class="search-form" id="store-search-form" method="get">
        <div class="search-input-wrapper">
            <input type="text" name="q" id="search-query" placeholder="Search product..." autocomplete="off" class="search-input">
            <button type="submit" class="search-btn" aria-label="Search">
                <!-- Simple Search Icon using Text (or you can use an SVG later) -->
                🔍
            </button>
        </div>
          </form>

        </div>
            <div class="responsive-main-header"
  
        <div class="header-right">
            <div class="main-header-right">
            <a href="/account" class="nav-link custom-account-link">Account</a>
            </div>
            <div class="h-search h-panel">
            <a href="/wishlist" class="nav-link icon-wishlist">Wishlist</a>
            <div class="block block-search">
            </div>
            </div>
            <div data-block="mini-cart" class="minicart-wrapper">
            <a href="/cart" class="nav-link">
            Cart<span class="cart-counter">0</span>
            </a>
            </div>
        </div>
</div>

    </div>

</header>

    </script>
</body>
</html>
